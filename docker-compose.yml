services:

  postgres:
    image: postgres:16-alpine
    container_name: ldoc-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ldoc
      POSTGRES_USER: ldoc
      POSTGRES_PASSWORD: ldoc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ldoc"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: ldoc-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
