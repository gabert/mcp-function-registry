# Source directory to scan (can be overridden via CLI arg)
ldoc.source.dir=

# PostgreSQL
ldoc.postgres.url=jdbc:postgresql://localhost:5432/ldoc
ldoc.postgres.user=ldoc
ldoc.postgres.password=ldoc

# Qdrant
ldoc.qdrant.host=localhost
ldoc.qdrant.port=6334
ldoc.qdrant.collection=ldoc_methods
ldoc.qdrant.vector.size=1536

# Claude (Anthropic)
ldoc.claude.model=claude-sonnet-4-6
ldoc.claude.max.tokens=1024

# OpenAI embeddings
ldoc.openai.embedding.model=text-embedding-3-small

# External callee exclusions — comma-separated package prefixes.
# Methods from these packages won't get stub entries in the graph.
ldoc.exclude.packages=java.,javax.,jdk.,sun.,com.sun.

# LSP (used when --lsp flag is passed)
# Shell-style command that launches a language server speaking LSP over stdio.
# Examples:
#   jdtls
#   pylsp
#   rust-analyzer
lsp.server.command=C:/Users/galla/.jdtls/jdtls.cmd
lsp.language.id=java
lsp.file.extension=.java
# Optional: persistent workspace cache dir (jdtls uses '-data <dir>'). If set, ldoc
# creates <lsp.workspace.dir>/<repository> and appends '-data <that>' to the command.
# Strongly recommended for jdtls on real projects — otherwise it re-indexes every run.
lsp.workspace.dir=C:/Users/galla/.ldoc/jdtls-workspaces
# Max ms to wait for the LSP server to finish indexing before querying symbols.
# jdtls on a large Maven project can take minutes on first run.
lsp.ready.timeout.ms=180000
